# money.iq-factura.com → iq-money (Next.js, PM2 :8203)
# Install on prod as /etc/nginx/sites-available/money.conf
#   ln -s ../sites-available/money.conf /etc/nginx/sites-enabled/
#   certbot --nginx -d money.iq-factura.com   (adds the TLS lines)
#   nginx -t && systemctl reload nginx
server {
  server_name money.iq-factura.com;
  location /.well-known/acme-challenge/ { root /var/www/letsencrypt; }

  client_max_body_size 64M;
  proxy_read_timeout 600s;
  proxy_send_timeout 600s;

  location / {
    proxy_pass http://127.0.0.1:8203;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
  }

  listen 80;
  listen [::]:80;
}
